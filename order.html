<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dasanayake Jewellery | Order</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background-color: #fffdf7;
    }

    /* Navbar */
    .navbar {
      background-color: #111;
    }
    .navbar a {
      color: white !important;
      font-weight: 500;
    }
    .navbar a:hover {
      color: #d4af37 !important;
    }

    /* Order Section */
    .order-section {
      padding: 70px 20px;
      text-align: center;
    }
    .order-section h2 {
      font-weight: bold;
      color: #111;
    }
    .order-section p {
      color: #555;
      margin-bottom: 40px;
    }

    /* Form */
    form {
      background: #fff;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.1);
      max-width: 700px;
      margin: auto;
    }
    label {
      font-weight: 500;
      color: #111;
    }
    .form-control:focus {
      border-color: #d4af37;
      box-shadow: 0 0 5px rgba(212, 175, 55, 0.5);
    }
    .btn-gold {
      background-color: #d4af37;
      color: white;
      border: none;
      transition: 0.3s;
    }
    .btn-gold:hover {
      background-color: #b08b2f;
    }

    /* Preview */
    .preview {
      margin-top: 60px;
      text-align: center;
    }
    .preview img {
      height: 230px;
      border-radius: 10px;
      transition: transform 0.3s ease;
    }
    .preview img:hover {
      transform: scale(1.05);
    }

    /* Footer */
    footer {
      background-color: #111;
      color: #d4af37;
      text-align: center;
      padding: 15px 0;
      margin-top: 50px;
    }
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
      <a class="navbar-brand fw-bold text-uppercase" href="index.html">💎 Dasanayake Jewellery</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
        <ul class="navbar-nav">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="products.html">Products</a></li>
          <li class="nav-item"><a class="nav-link active" href="order.html">Order</a></li>
          <li class="nav-item"><a class="nav-link" href="about.html">About Us</a></li>
          <li class="nav-item"><a class="nav-link" href="contact.html">Contact Us</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Order Section -->
  <section class="order-section container">
    <h2>Place Your Order</h2>
    <p>Complete the form below to order your favorite jewellery from Dasanayake Jewellers.</p>

    <form>
      <div class="row g-3">
        <div class="col-md-6">
          <label for="name" class="form-label">Full Name</label>
          <input type="text" id="name" class="form-control" placeholder="Enter your name" required>
        </div>
        <div class="col-md-6">
          <label for="email" class="form-label">Email Address</label>
          <input type="email" id="email" class="form-control" placeholder="you@example.com" required>
        </div>

        <div class="col-md-6">
          <label for="product" class="form-label">Select Product</label>
          <select id="product" class="form-control" required>
            <option value="">Choose...</option>
            <option>Royal Gold Necklace</option>
            <option>Diamond Engagement Ring</option>
            <option>Pearl Drop Earrings</option>
            <option>Elegant Gold Bangles</option>
            <option>Emerald Pendant</option>
            <option>Silver Charm Bracelet</option>
          </select>
        </div>

        <div class="col-md-6">
          <label for="quantity" class="form-label">Quantity</label>
          <input type="number" id="quantity" class="form-control" min="1" value="1" required>
        </div>

        <div class="col-md-12">
          <label for="address" class="form-label">Delivery Address</label>
          <textarea id="address" class="form-control" rows="3" placeholder="Enter your full address" required></textarea>
        </div>

        <div class="col-md-6">
          <label for="payment" class="form-label">Payment Method</label>
          <select id="payment" class="form-control" required>
            <option value="">Select...</option>
            <option>Cash on Delivery</option>
            <option>Bank Transfer</option>
            <option>Credit/Debit Card</option>
          </select>
        </div>

        <div class="col-md-6 d-flex align-items-end">
          <button type="submit" class="btn btn-gold w-100">Submit Order</button>
        </div>
      </div>
    </form>

    <!-- Product Preview -->
    <div class="preview mt-5">
      <h3>Featured Designs</h3>
      <div class="row mt-3 g-3 justify-content-center">
        <div class="col-md-3">
          <img src="img 2.avif" alt="Ring" class="img-fluid">
        </div>
        <div class="col-md-3">
          <img src="https://images.unsplash.com/photo-1599643478518-a784e5dc4c8f?auto=format&fit=crop&w=800&q=80" alt="Necklace" class="img-fluid">
        </div>
        <div class="col-md-3">
          <img src="img 4.jpg" alt="Earrings" class="img-fluid">
        </div>
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer>
    © 2025 Dasanayake Jewellery | Designed by P.Dasanayake
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
